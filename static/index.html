<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>engram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --purple:#a855f7;--cyan:#06b6d4;--green:#238636;
  --text:#e6edf3;--muted:#8b949e;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;height:100dvh;
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;
  overflow:hidden;
}
body{display:flex;flex-direction:column}

/* Header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  padding-top:calc(12px + var(--safe-top));
  border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
  gap:10px;
}
.logo{
  font-size:1.35rem;font-weight:600;white-space:nowrap;
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.header-left{display:flex;align-items:center;gap:10px;min-width:0}
.status-pill{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:999px;
  background:rgba(255,255,255,0.05);
  font-size:0.72rem;color:var(--muted);
  white-space:nowrap;
}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.err{background:#f85149;box-shadow:0 0 6px #f85149}

/* Stats — hidden on narrow screens */
.stats-bar{
  display:flex;gap:12px;font-size:0.68rem;color:var(--muted);
  flex-shrink:0;
}
@media(max-width:480px){
  .stats-bar{display:none}
}
.stat{display:flex;align-items:center;gap:3px}
.stat b{color:var(--text);font-weight:500}

/* Chat area */
.chat-area{
  flex:1;overflow-y:auto;
  padding:16px 12px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.empty-state{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:0.9rem;font-style:italic;
  text-align:center;padding:20px;
}

/* Messages */
.msg{
  display:flex;flex-direction:column;
  max-width:min(75%, 520px);
  animation:slideIn .25s ease-out;
}
@media(max-width:480px){
  .msg{max-width:88%}
}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.bot{align-self:flex-start;align-items:flex-start}
.bubble{
  padding:10px 14px;border-radius:16px;line-height:1.5;
  font-size:0.92rem;word-break:break-word;
}
.msg.user .bubble{
  background:var(--green);
  border-bottom-right-radius:4px;
  color:#fff;
}
.msg.bot .bubble{
  background:var(--surface);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.82rem;
}
.msg-time{font-size:0.62rem;color:var(--muted);margin-top:4px;padding:0 4px}
.msg-meta{
  display:flex;gap:6px;margin-top:4px;padding:0 4px;
  font-size:0.62rem;color:var(--muted);flex-wrap:wrap;
}
.meta-tag{
  padding:1px 6px;border-radius:4px;
  background:rgba(255,255,255,0.05);
}

/* Typing indicator */
.typing{display:flex;align-items:center;gap:4px;padding:10px 14px}
.typing span{
  width:6px;height:6px;border-radius:50%;background:var(--muted);
  animation:blink 1.4s infinite both;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

/* Introspection panel */
.introspection{
  margin-bottom:4px;border-radius:10px;overflow:hidden;
  border:1px solid rgba(168,85,247,0.25);
  background:rgba(168,85,247,0.05);
  animation:slideIn .25s ease-out;
  width:100%;
}
.introspection-header{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;cursor:pointer;user-select:none;
  font-size:0.73rem;color:var(--purple);font-weight:500;
  -webkit-tap-highlight-color:transparent;
}
.introspection-header .chevron{transition:transform .2s;font-size:0.6rem}
.introspection-header .chevron.collapsed{transform:rotate(-90deg)}
.introspection-body{
  padding:0 12px 8px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;color:var(--muted);line-height:1.6;
  overflow:hidden;
  transition:max-height .3s ease,padding .3s ease;
}
.introspection-body.collapsed{max-height:0;padding-top:0;padding-bottom:0}
.thought-line{display:flex;align-items:flex-start;gap:6px;padding:1px 0}
.thought-icon{flex-shrink:0;width:14px;text-align:center}
.thought-text{color:var(--muted);word-break:break-all}
.thought-line[data-type="memory_query"] .thought-text{color:#c084fc}
.thought-line[data-type="context_found"] .thought-text{color:#22d3ee}
.thought-line[data-type="attention"] .thought-text{color:#facc15}
.thought-line[data-type="ponder"] .thought-text{color:#f97316}
.thought-line[data-type="vocab_sample"] .thought-text{color:#4ade80}

@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Input area */
.input-area{
  padding:10px 12px;
  padding-bottom:calc(10px + var(--safe-bottom));
  border-top:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
.input-wrap{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:14px;padding:8px 10px;
  transition:border-color .2s;
}
.input-wrap:focus-within{border-color:var(--purple)}
.input-wrap textarea{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Inter',sans-serif;
  font-size:16px; /* 16px prevents iOS auto-zoom */
  resize:none;line-height:1.4;
  max-height:calc(1.4em * 4);
  -webkit-appearance:none;
}
.input-wrap textarea::placeholder{color:var(--muted)}
.char-count{
  font-size:0.62rem;color:var(--muted);
  white-space:nowrap;padding-bottom:2px;
  align-self:flex-end;
}
@media(max-width:380px){.char-count{display:none}}
.send-btn{
  background:var(--purple);border:none;border-radius:10px;
  width:38px;height:38px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.send-btn:hover{opacity:.85}
.send-btn:active{transform:scale(.93)}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.send-btn svg{width:18px;height:18px;fill:#fff}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">engram</div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting...</span>
    </div>
  </div>
  <div class="stats-bar" title="Hover for training details">
    <div class="stat">model <b id="statModel">—</b></div>
    <div class="stat">vocab <b id="statVocab">—</b></div>
    <div class="stat">arch <b id="statArch">—</b></div>
    <div class="stat">loss <b id="statLoss">—</b></div>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">Start a conversation with engram...</div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="Message engram..." maxlength="1000"></textarea>
    <span class="char-count" id="charCount">0</span>
    <button class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const chatArea=document.getElementById('chatArea');
const emptyState=document.getElementById('emptyState');
const msgInput=document.getElementById('msgInput');
const sendBtn=document.getElementById('sendBtn');
const charCount=document.getElementById('charCount');
const statusDot=document.getElementById('statusDot');
const statusText=document.getElementById('statusText');
let waiting=false;

const THOUGHT_ICONS={
  memory_query:'\u{1F50D}',context_found:'\u{1F4CE}',
  attention:'\u{1F3AF}',ponder:'\u{1F9E0}',vocab_sample:'\u{1F3B2}'
};

// Auto-resize textarea
msgInput.addEventListener('input',()=>{
  msgInput.style.height='auto';
  const lh=parseFloat(getComputedStyle(msgInput).lineHeight);
  msgInput.style.height=Math.min(msgInput.scrollHeight,lh*4)+'px';
  charCount.textContent=msgInput.value.length;
  sendBtn.disabled=!msgInput.value.trim()||waiting;
});

// Enter to send (desktop), Shift+Enter for newline
msgInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey&&!('ontouchstart' in window)){
    e.preventDefault();
    if(!sendBtn.disabled)send();
  }
});

sendBtn.addEventListener('click',send);

function timeStr(){
  return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function addMsg(text,role,stats){
  emptyState.style.display='none';
  const div=document.createElement('div');
  div.className='msg '+role;
  let html=`<div class="bubble">${esc(text)}</div><div class="msg-time">${timeStr()}</div>`;
  if(role==='bot'&&stats){
    html+=`<div class="msg-meta">
      <span class="meta-tag">surprise ${stats.surprise}</span>
      <span class="meta-tag">ponder ${stats.ponder_steps}</span>
    </div>`;
  }
  div.innerHTML=html;
  chatArea.appendChild(div);
  chatArea.scrollTop=chatArea.scrollHeight;
  return div;
}

function createStreamingMsg(){
  emptyState.style.display='none';
  const wrapper=document.createElement('div');
  wrapper.className='msg bot';
  wrapper.id='streamingMsg';

  const intro=document.createElement('div');
  intro.className='introspection';
  intro.id='introspectionPanel';
  let collapsed=false;
  intro.innerHTML=`
    <div class="introspection-header" id="introToggle">
      <span>\u{1F9E0}</span>
      <span>Engram Thinking</span>
      <span class="chevron" id="introChevron">\u25BC</span>
    </div>
    <div class="introspection-body" id="introBody"></div>`;
  wrapper.appendChild(intro);

  const bubble=document.createElement('div');
  bubble.className='bubble';
  bubble.id='streamBubble';
  bubble.textContent='';
  wrapper.appendChild(bubble);

  chatArea.appendChild(wrapper);
  chatArea.scrollTop=chatArea.scrollHeight;

  document.getElementById('introToggle').addEventListener('click',()=>{
    collapsed=!collapsed;
    document.getElementById('introBody').classList.toggle('collapsed',collapsed);
    document.getElementById('introChevron').classList.toggle('collapsed',collapsed);
  });

  return wrapper;
}

function addThought(type,content){
  const body=document.getElementById('introBody');
  if(!body)return;
  const line=document.createElement('div');
  line.className='thought-line';
  line.dataset.type=type;
  line.innerHTML=`<span class="thought-icon">${THOUGHT_ICONS[type]||'\u2728'}</span><span class="thought-text">${esc(content)}</span>`;
  body.appendChild(line);
  chatArea.scrollTop=chatArea.scrollHeight;
}

function appendToken(token){
  const bubble=document.getElementById('streamBubble');
  if(!bubble)return;
  if(bubble.textContent)bubble.textContent+=' ';
  bubble.textContent+=token;
  chatArea.scrollTop=chatArea.scrollHeight;
}

function finalizeStream(stats){
  const wrapper=document.getElementById('streamingMsg');
  if(!wrapper)return;
  wrapper.removeAttribute('id');

  const timeDiv=document.createElement('div');
  timeDiv.className='msg-time';
  timeDiv.textContent=timeStr();
  wrapper.appendChild(timeDiv);

  if(stats){
    const meta=document.createElement('div');
    meta.className='msg-meta';
    meta.innerHTML=`
      <span class="meta-tag">surprise ${stats.surprise}</span>
      <span class="meta-tag">ponder ${stats.ponder_steps}</span>`;
    wrapper.appendChild(meta);
  }

  const body=document.getElementById('introBody');
  const chev=document.getElementById('introChevron');
  if(body)body.classList.add('collapsed');
  if(chev)chev.classList.add('collapsed');

  const panel=document.getElementById('introspectionPanel');
  if(panel)panel.removeAttribute('id');
  const bb=document.getElementById('streamBubble');
  if(bb)bb.removeAttribute('id');
  if(body)body.removeAttribute('id');
  const tog=document.getElementById('introToggle');
  if(tog)tog.removeAttribute('id');
  if(chev)chev.removeAttribute('id');
}

function resetInput(){
  waiting=false;
  msgInput.disabled=false;
  msgInput.focus();
  sendBtn.disabled=!msgInput.value.trim();
}

async function send(){
  const text=msgInput.value.trim();
  if(!text||waiting)return;
  waiting=true;
  msgInput.value='';
  msgInput.style.height='auto';
  charCount.textContent='0';
  sendBtn.disabled=true;
  msgInput.disabled=true;

  addMsg(text,'user');
  createStreamingMsg();

  try{
    const es=new EventSource('/chat/stream?message='+encodeURIComponent(text));

    es.addEventListener('thought',e=>{
      const d=JSON.parse(e.data);
      addThought(d.type,d.content);
    });

    es.addEventListener('token',e=>{
      const d=JSON.parse(e.data);
      appendToken(d.token);
    });

    es.addEventListener('done',e=>{
      const d=JSON.parse(e.data);
      const bubble=document.getElementById('streamBubble');
      if(bubble&&!bubble.textContent)bubble.textContent=d.response;
      finalizeStream(d.stats);
      es.close();
      resetInput();
    });

    es.onerror=()=>{
      es.close();
      const bubble=document.getElementById('streamBubble');
      if(bubble&&!bubble.textContent)bubble.textContent='Connection error \u2014 is the server running?';
      finalizeStream(null);
      resetInput();
    };
  }catch(err){
    const bubble=document.getElementById('streamBubble');
    if(bubble)bubble.textContent='Connection error \u2014 is the server running?';
    finalizeStream(null);
    resetInput();
  }
}

async function fetchStatus(){
  try{
    const res=await fetch('/status');
    const d=await res.json();
    if(d.loaded){
      statusDot.className='status-dot ok';
      statusText.textContent='loaded';
    }else{
      statusDot.className='status-dot err';
      statusText.textContent=d.error||'not loaded';
    }
    document.getElementById('statModel').textContent=d.active_model||'\u2014';
    document.getElementById('statVocab').textContent=d.vocab_size?d.vocab_size.toLocaleString():'\u2014';
    const arch=d.n_layers&&d.embed_dim?`${d.n_layers}L\u00b7${d.embed_dim}D${d.use_rope?'\u00b7RoPE':''}`:'\u2014';
    document.getElementById('statArch').textContent=arch;
    document.getElementById('statLoss').textContent=d.final_loss?d.final_loss.toFixed(4):'\u2014';

    // Tooltip with full training details
    const tt=[];
    if(d.epochs)tt.push(`${d.epochs} epoch${d.epochs===1?'':'s'}`);
    if(d.corpus)tt.push(`corpus: ${d.corpus}`);
    if(d.gpu)tt.push(`gpu: ${d.gpu}`);
    if(d.training_cost_usd)tt.push(`cost: $${d.training_cost_usd.toFixed(2)}`);
    if(d.avg_ponder_steps)tt.push(`avg ponder: ${d.avg_ponder_steps.toFixed(1)}`);
    if(d.trained_at)tt.push(`trained: ${d.trained_at}`);
    if(d.notes)tt.push(`\n${d.notes}`);
    document.querySelector('.stats-bar').title=tt.join(' \u00b7 ');
  }catch{
    statusDot.className='status-dot err';
    statusText.textContent='offline';
  }
}
fetchStatus();
setInterval(fetchStatus,30000);
// Don't auto-focus on mobile (causes keyboard to pop open)
if(!('ontouchstart' in window))msgInput.focus();
</script>
</body>
</html>
